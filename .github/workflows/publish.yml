name: Publish course site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential gfortran gdal-bin ghostscript imagemagick \
            libcurl4-openssl-dev libfontconfig1-dev libfreetype6-dev \
            libfribidi-dev libgdal-dev libgeos-dev libgit2-dev \
            libglpk-dev libharfbuzz-dev libicu-dev libjpeg-dev \
            libmagick++-dev libpng-dev libproj-dev libssl-dev \
            libtiff-dev libudunits2-dev libv8-dev libxml2-dev \
            libpoppler-cpp-dev locales \
            make pandoc zlib1g-dev
          sudo locale-gen \
            en_US.UTF-8 fr_FR.UTF-8 fr_BE.UTF-8 \
            it_IT.UTF-8 zh_CN.UTF-8 de_DE.UTF-8

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: renv
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v2

      - name: Restore renv dependencies
        uses: r-lib/actions/setup-renv@v2

      - name: Install supplemental build packages
        run: Rscript -e 'install.packages(c("chromote", "countrycode", "latex2exp", "pdftools"))'

      - name: Build targets pipeline
        env:
          CHROMOTE_CHROME: ${{ steps.chrome.outputs.chrome-path }}
        run: Rscript -e 'targets::tar_make()'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
